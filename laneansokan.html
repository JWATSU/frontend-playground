<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nordiska Banken - Låneansökan - Ärende #482910</title>
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="styles.css">
    <script>
        // Suppress sidebar transition on initial load to prevent FOUC
        if (localStorage.getItem('sidebar_collapsed') === 'true') {
            document.documentElement.classList.add('sidebar-preload-collapsed');
        }
    </script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar placeholder loaded dynamically -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Viewport Area -->
        <main class="main-viewport">
            <!-- Sticky Case Header placeholder loaded dynamically -->
            <div id="header-placeholder" data-title="Låneansökan" data-breadcrumb="Ärende #482910" data-status-text="Under utredning" data-status-class="under-review">
                <button class="btn btn-primary btn-primary-dark mr-2" id="btn-edit-loan">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                    <span>Ändra Ansökan</span>
                </button>
            </div>

            <!-- Scrollable Dashboard Grid -->
            <div class="dashboard-grid">
                
                <div class="dashboard-card col-12">
                    <div class="card-header">
                        <div class="card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                            Lånedetaljer
                        </div>
                    </div>
                    <div class="customer-detail-list">
                        <div class="detail-item detail-item-wide">
                            <span class="detail-label">Syfte</span>
                            <span class="detail-value text-xl">Bolån (Bostadsrätt)</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Sökt Belopp</span>
                            <span class="detail-value text-xl font-bold">3 450 000 SEK</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Kontantinsats</span>
                            <span class="detail-value">862 500 SEK (20%)</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Köpeskilling</span>
                            <span class="detail-value">4 312 500 SEK</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Belåningsgrad</span>
                            <span class="detail-value">80%</span>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Application Footer placeholder loaded dynamically -->
            <div id="footer-placeholder"></div>
        </main>
        
    </div>

    <!-- Script Entrypoint -->
    <script src="components.js"></script>
    <script src="app.js"></script>
</body>

</html>
