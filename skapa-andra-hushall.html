<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nordiska Banken - Skapa / Ändra Hushåll</title>
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="styles.css">
    <script>
        // Suppress sidebar transition on initial load to prevent FOUC
        if (localStorage.getItem('sidebar_collapsed') === 'true') {
            document.documentElement.classList.add('sidebar-preload-collapsed');
        }
    </script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar placeholder loaded dynamically -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Viewport Area -->
        <main class="main-viewport">
            <!-- Sticky Case Header placeholder loaded dynamically -->
            <div id="header-placeholder" data-title="Kundinformation" data-breadcrumb="Ärende #482910 / Kunddetaljer" data-parent-step="kunddetaljer.html" data-status-text="Under utredning" data-status-class="under-review">
                <div id="header-subnav-items" style="display: none; align-items: flex-start; gap: 1.5rem;">
                    <a href="limitgrupp.html" class="subnav-link">Limitgrupp</a>
                    <div style="display: flex; flex-direction: column;">
                        <a href="kunddetaljer.html" class="subnav-link">Kunddetaljer</a>
                        <a href="skapa-andra-hushall.html" class="sub-step-link active">
                            ↳ Skapa / Ändra hushåll
                        </a>
                    </div>
                </div>
                <button class="btn btn-primary btn-primary-dark mr-2" id="btn-save-household">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    <span>Spara Ändringar</span>
                </button>
            </div>

            <!-- Scrollable Dashboard Grid -->
            <div class="dashboard-grid">
                
                <div class="dashboard-card col-12">
                    <div class="card-header">
                        <div class="card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            Hushållskonfiguration
                        </div>
                    </div>
                    <div class="customer-detail-list">
                        <div class="detail-item detail-item-wide" data-field-type="select">
                            <span class="detail-label">Hushållstyp</span>
                            <div class="edit-view" style="display: block;">
                                <select class="form-select edit-input">
                                    <option value="Ensamstående">Ensamstående</option>
                                    <option value="Par utan hemmaboende barn" selected>Par utan hemmaboende barn</option>
                                    <option value="Par med hemmaboende barn">Par med hemmaboende barn</option>
                                    <option value="Ensamstående med hemmaboende barn">Ensamstående med hemmaboende barn</option>
                                </select>
                            </div>
                        </div>
                        <div class="detail-item detail-item-wide">
                            <span class="detail-label">Lägg till Medsökande / Hushållsmedlem</span>
                            <div class="edit-view" style="display: flex; gap: 0.5rem; align-items: center;">
                                <input type="text" class="form-input edit-input" placeholder="ÅÅÅÅMMDD-XXXX" style="width: 200px;">
                                <button class="btn btn-secondary">Sök person</button>
                            </div>
                        </div>
                        <div class="detail-item detail-item-wide">
                            <span class="detail-label">Nuvarande Medlemmar</span>
                            <div class="edit-view" style="display: block;">
                                <ul class="flex-column-gap text-sm">
                                    <li style="display: flex; justify-content: space-between; padding: 0.5rem; background: rgba(255,255,255,0.05); border-radius: 4px;">
                                        <span><strong>Johan Andersson</strong> (Huvudsökande)</span>
                                    </li>
                                    <li style="display: flex; justify-content: space-between; padding: 0.5rem; background: rgba(255,255,255,0.05); border-radius: 4px;">
                                        <span><strong>Anna Andersson</strong> (Medsökande)</span>
                                        <button class="btn btn-icon" title="Ta bort" style="padding: 0; min-height: auto;">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                        </button>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Application Footer placeholder loaded dynamically -->
            <div id="footer-placeholder"></div>
        </main>
        
    </div>

    <!-- Script Entrypoint -->
    <script src="components.js"></script>
    <script src="app.js"></script>
</body>

</html>
